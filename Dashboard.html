<script>
  function toggleMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (sidebar && overlay) {
      if (sidebar.classList.contains('hidden')) {
        sidebar.classList.remove('hidden');
        overlay.classList.remove('hidden');
        setTimeout(() => sidebar.classList.remove('-translate-x-full'), 10);
      } else {
        sidebar.classList.add('-translate-x-full');
        setTimeout(() => {
          sidebar.classList.add('hidden');
          overlay.classList.add('hidden');
        }, 300);
      }
    }
  }

  function toggleSearchBar() {
    const container = document.getElementById('searchBarContainer');
    if (container) {
      if (container.classList.contains('hidden')) {
        container.classList.remove('hidden');
        const inputField = document.getElementById('searchInput');
        if (inputField) inputField.focus();
      } else {
        clearGlobalSearch();
      }
    }
  }

  function handleGlobalSearch() {
    state.searchQuery = document.getElementById('searchInput').value || '';
    if (state.activeView === 'stok') renderStokView();
    else if (state.activeView === 'klinik') renderKlinikGrid();
    else if (state.activeView === 'return') renderReturnView();
    else if (state.activeView === 'clinic-detail') renderClinicDetailView();
  }

  function clearGlobalSearch() {
    const inp = document.getElementById('searchInput');
    if (inp) inp.value = '';
    state.searchQuery = '';
    const container = document.getElementById('searchBarContainer');
    if (container) container.classList.add('hidden');
    handleGlobalSearch();
  }

  function logout() {
    sessionStorage.removeItem('rg_user_session');
    sessionStorage.removeItem('rg_role_session');
    sessionStorage.removeItem('rg_clinic_session');
    state.currentUser = null;
    state.currentRole = null;
    state.currentClinicId = null;
    const loginScr = document.getElementById('loginScreen');
    if (loginScr) loginScr.classList.remove('hidden');
    showToast("🔐 Sesi login ditutup.");
    toggleMenu();
  }

  /**
   * MEMPERBARUI INDIKATOR MENU TAB DENGAN INTEGRASI RETURN STANDALONE & TINGGI KAPSUL h-16
   */
  function updateTabIndicator(activeView) {
    const tabStok = document.getElementById('tab-stok');
    const tabEntry = document.getElementById('tab-entry');
    const tabKlinik = document.getElementById('tab-klinik');
    const tabReturn = document.getElementById('tab-return');
    const tabFaktur = document.getElementById('tab-faktur');

    const userRole = (state.currentRole || '').toUpperCase();
    const isEntryAdminOrOwner = userRole === 'ADMIN' || userRole === 'OWNER';
    const isFakturOwnerOnly = userRole === 'OWNER';

    const tabs = [tabStok, tabEntry, tabKlinik, tabReturn, tabFaktur];

    tabs.forEach(tab => {
      if (tab) {
        if (tab.id === 'tab-entry' && !isEntryAdminOrOwner) {
          tab.classList.add('hidden');
        }
        if (tab.id === 'tab-faktur' && !isFakturOwnerOnly) {
          tab.classList.add('hidden');
        }
        
        const circle = tab.querySelector('.bubble-nav-item');
        const label = tab.querySelector('.bubble-label');
        if (circle) {
          circle.classList.remove('bubble-active-circle');
          circle.classList.add('text-gray-400');
        }
        if (label) {
          label.classList.remove('bubble-label-active');
        }
      }
    });

    let activeBtn = null;
    if (activeView === 'stok') activeBtn = tabStok;
    else if (activeView === 'entry' && isEntryAdminOrOwner) activeBtn = tabEntry;
    else if (activeView === 'klinik') activeBtn = tabKlinik;
    else if (activeView === 'return') activeBtn = tabReturn;
    else if (activeView === 'faktur' && isFakturOwnerOnly) activeBtn = tabFaktur;

    if (activeBtn) {
      const circle = activeBtn.querySelector('.bubble-nav-item');
      const label = activeBtn.querySelector('.bubble-label');
      if (circle) {
        circle.classList.remove('text-gray-400');
        circle.classList.add('bubble-active-circle');
      }
      if (label) {
        label.classList.add('bubble-label-active');
      }
    }
  }

  window.toggleMenu = toggleMenu;
  window.toggleSearchBar = toggleSearchBar;
  window.handleGlobalSearch = handleGlobalSearch;
  window.clearGlobalSearch = clearGlobalSearch;
  window.logout = logout;
</script>
