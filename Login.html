<!-- ================= LAYAR LOGIN SECURITY DENGAN 3D CARD FLIP EFFECT ================= -->
<style>
  .perspective-1000 {
    perspective: 1000px;
  }
  .preserve-3d {
    transform-style: preserve-3d;
  }
  .backface-hidden {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .rotate-y-180 {
    transform: rotateY(180deg);
  }
  .flip-card-inner {
    transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
  }
  .flipped {
    transform: rotateY(180deg);
  }
</style>

<div id="loginScreen" class="absolute inset-0 bg-gradient-to-b from-amber-50 to-white z-[95] flex flex-col items-center justify-center p-4">
  <div class="w-full max-w-sm perspective-1000">
    <!-- Card Container dengan 3D Preserve -->
    <div id="flipCardInner" class="w-full preserve-3d flip-card-inner relative min-h-[460px]">
      
      <!-- ================= SISI DEPAN (FRONT SIDE): PEMILIH PERAN ================= -->
      <div class="absolute inset-0 w-full h-full bg-white p-8 rounded-3xl shadow-xl border border-amber-100 flex flex-col items-center justify-between backface-hidden z-20">
        
        <!-- Logo Header -->
        <div class="flex flex-col items-center space-y-3 w-full">
          <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-[#D9B56B] to-[#e6c27e] flex items-center justify-center shadow-lg border-4 border-white">
            <span class="text-white text-4xl font-serif font-extrabold select-none">E</span>
          </div>
          <div class="text-center space-y-1">
            <h2 class="text-2xl font-extrabold text-gray-800 tracking-tight">Ellis Estetika</h2>
            <p class="text-[10px] text-amber-600 font-bold tracking-widest uppercase">SISTEM GUDANG & KLINIK</p>
          </div>
        </div>

        <!-- Pemilih Role -->
        <div class="w-full space-y-4 my-4">
          <p class="text-center text-[10px] font-black text-gray-400 uppercase tracking-widest">PILIH AKSES MASUK</p>
          <div class="grid grid-cols-4 gap-2 w-full">
            
            <!-- Tombol Owner -->
            <button onclick="selectRole('OWNER')" class="flex flex-col items-center space-y-2 group">
              <div class="w-12 h-12 rounded-full bg-purple-50 hover:bg-purple-100 group-active:scale-90 transition-all flex items-center justify-center border border-purple-100 shadow-sm">
                <svg class="w-5 h-5 text-purple-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z"/>
                  <path d="M5 20h14"/>
                </svg>
              </div>
              <span class="text-[9px] font-black text-gray-500 tracking-wider group-hover:text-purple-600 uppercase transition-colors">Owner</span>
            </button>

            <!-- Tombol Admin -->
            <button onclick="selectRole('ADMIN')" class="flex flex-col items-center space-y-2 group">
              <div class="w-12 h-12 rounded-full bg-rose-50 hover:bg-rose-100 group-active:scale-90 transition-all flex items-center justify-center border border-rose-100 shadow-sm">
                <svg class="w-5 h-5 text-rose-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                  <path d="m9 12 2 2 4-4"/>
                </svg>
              </div>
              <span class="text-[9px] font-black text-gray-500 tracking-wider group-hover:text-rose-600 uppercase transition-colors">Admin</span>
            </button>

            <!-- Tombol User -->
            <button onclick="selectRole('USER')" class="flex flex-col items-center space-y-2 group">
              <div class="w-12 h-12 rounded-full bg-sky-50 hover:bg-sky-100 group-active:scale-90 transition-all flex items-center justify-center border border-sky-100 shadow-sm">
                <svg class="w-5 h-5 text-sky-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                  <circle cx="9" cy="7" r="4" />
                  <circle cx="19" cy="11" r="2" />
                  <path d="M19 8v1" />
                  <path d="M19 13v1" />
                  <path d="M16.5 11h1" />
                  <path d="M20.5 11h1" />
                </svg>
              </div>
              <span class="text-[9px] font-black text-gray-500 tracking-wider group-hover:text-sky-600 uppercase transition-colors">User</span>
            </button>

            <!-- Tombol Viewer -->
            <button onclick="selectRole('VIEWER')" class="flex flex-col items-center space-y-2 group">
              <div class="w-12 h-12 rounded-full bg-emerald-50 hover:bg-emerald-100 group-active:scale-90 transition-all flex items-center justify-center border border-emerald-100 shadow-sm">
                <svg class="w-5 h-5 text-emerald-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </div>
              <span class="text-[9px] font-black text-gray-500 tracking-wider group-hover:text-emerald-600 uppercase transition-colors">Viewer</span>
            </button>

          </div>
        </div>

        <div class="text-[9px] text-gray-400 text-center font-semibold w-full pt-3 border-t border-gray-100">
          Silakan ketuk salah satu peran di atas untuk login.
        </div>
      </div>

      <!-- ================= SISI BELAKANG (BACK SIDE): FORM LOGIN PERAN ================= -->
      <div class="absolute inset-0 w-full h-full bg-white p-8 rounded-3xl shadow-xl border border-amber-100 flex flex-col justify-between rotate-y-180 backface-hidden z-10">
        
        <div class="w-full flex flex-col items-center space-y-4">
          <div class="w-12 h-12 rounded-full bg-[#D9B56B] flex items-center justify-center shadow">
            <span class="text-white text-2xl font-serif font-extrabold select-none">E</span>
          </div>
          <div class="text-center">
            <h3 id="roleLoginTitle" class="text-xs font-black text-gray-800 uppercase tracking-wider">LOGIN SEBAGAI OWNER</h3>
            <p class="text-[9px] text-amber-600 font-black tracking-widest mt-0.5">MASUKKAN PIN KEAMANAN</p>
          </div>
        </div>

        <form id="loginForm" onsubmit="submitLogin(event)" class="w-full space-y-4 my-2">
          <div class="space-y-1">
            <label class="block text-[10px] font-bold text-gray-400 tracking-wider uppercase">NAMA PENGGUNA</label>
            <div class="relative flex items-center">
              <svg class="absolute left-3 w-5 h-5 text-gray-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <input type="text" id="login-username" required class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 text-gray-700 font-semibold uppercase" placeholder="Username">
            </div>
          </div>

          <div class="space-y-1">
            <label class="block text-[10px] font-bold text-gray-400 tracking-wider uppercase">PASSWORD / PIN</label>
            <div class="relative flex items-center">
              <svg class="absolute left-3 w-5 h-5 text-gray-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input type="password" id="login-password" required class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 text-gray-700 font-semibold" placeholder="PIN Anda">
            </div>
          </div>

          <button type="submit" class="w-full bg-[#D9B56B] hover:bg-amber-600 active:scale-[0.98] text-white py-3.5 rounded-xl text-xs font-bold tracking-widest uppercase transition-all shadow-md flex items-center justify-center gap-2 mt-2">
            <span>MASUK</span>
            <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </form>

        <button onclick="flipBack()" class="w-full bg-gray-50 hover:bg-gray-100 text-gray-500 py-2.5 rounded-xl text-xs font-black tracking-widest uppercase transition-all border border-gray-100 flex items-center justify-center gap-1.5">
          <svg class="w-4 h-4 text-gray-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          <span>KEMBALI</span>
        </button>
      </div>

    </div>
  </div>
</div>

<script>
  let selectedRole = "";

  function selectRole(role) {
    selectedRole = role;
    const innerCard = document.getElementById('flipCardInner');
    const titleHeader = document.getElementById('roleLoginTitle');
    
    if (titleHeader) {
      titleHeader.innerText = "LOGIN SEBAGAI " + role;
    }
    
    if (innerCard) {
      innerCard.classList.add('flipped');
    }
  }

  function flipBack() {
    selectedRole = "";
    const innerCard = document.getElementById('flipCardInner');
    
    document.getElementById('login-username').value = "";
    document.getElementById('login-password').value = "";
    
    if (innerCard) {
      innerCard.classList.remove('flipped');
    }
  }

  function submitLogin(event) {
    if (event) event.preventDefault();
    const uName = document.getElementById('login-username').value.trim();
    const uPass = document.getElementById('login-password').value.trim();

    showLoading(true, "MEMVERIFIKASI AKUN...");

    callServer('processLogin', uName, uPass)
      .then(response => {
        showLoading(false);
        if (response && response.success) {
          const serverRole = response.role.toUpperCase();
          if (serverRole !== selectedRole) {
            showToast(`⚠️ Username ini terdaftar sebagai ${serverRole}, bukan ${selectedRole}!`);
            return;
          }

          state.currentUser = response.username;
          state.currentRole = serverRole;
          state.currentClinicId = response.id_klinik || '';
          
          sessionStorage.setItem('rg_user_session', response.username);
          sessionStorage.setItem('rg_role_session', response.role);
          sessionStorage.setItem('rg_clinic_session', response.id_klinik || '');
          
          document.getElementById('loginScreen').classList.add('hidden');
          setupNavPermissions();
          fetchData();
        } else {
          const errorMsg = response ? response.error : "Kredensial salah atau koneksi gagal.";
          showToast("⚠️ " + errorMsg);
        }
      })
      .catch(err => {
        showLoading(false);
        showToast("⚠️ Gangguan Login: " + err.message);
      });
  }

  /**
   * MEMPERBARUI PERMISI NAVIGASI DENGAN TINGGI KAPSUL h-12 SECARA INDEPENDEN
   */
  function setupNavPermissions() {
    const roleBadge = document.getElementById('roleBadge');
    const tabEntry = document.getElementById('tab-entry');
    const tabFaktur = document.getElementById('tab-faktur');
    const sidebarEntry = document.getElementById('menu-entry-sidebar');
    const sidebarFaktur = document.getElementById('menu-faktur-sidebar');
    const bottomNav = document.getElementById('bottomNav');
    
    const userRole = (state.currentRole || "USER").toUpperCase();

    if (roleBadge) {
      roleBadge.innerText = userRole;
      if (userRole === 'OWNER') {
        roleBadge.className = "bg-purple-600 text-white text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider mr-1";
      } else if (userRole === 'ADMIN') {
        roleBadge.className = "bg-rose-500 text-white text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider mr-1";
      } else if (userRole === 'VIEWER') {
        roleBadge.className = "bg-emerald-500 text-white text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider mr-1";
      } else {
        roleBadge.className = "bg-sky-500 text-white text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider mr-1";
      }
    }

    // Mengonfigurasi Bottom Navigation Grid & Visibilitas Menu Berdasarkan Role
    if (userRole === 'OWNER') {
      if (tabEntry) tabEntry.classList.remove('hidden');
      if (tabFaktur) tabFaktur.classList.remove('hidden');
      if (sidebarEntry) sidebarEntry.classList.remove('hidden');
      if (sidebarFaktur) sidebarFaktur.classList.remove('hidden');
      if (bottomNav) {
        bottomNav.className = "bg-white border border-gray-150 rounded-full absolute bottom-3 left-0 right-0 mx-6 grid grid-cols-5 h-12 z-40 shadow-[0_8px_30px_rgba(0,0,0,0.12)] transition-all overflow-visible";
      }
    } else if (userRole === 'ADMIN') {
      if (tabEntry) tabEntry.classList.remove('hidden');
      if (tabFaktur) tabFaktur.classList.add('hidden');
      if (sidebarEntry) sidebarEntry.classList.remove('hidden');
      if (sidebarFaktur) sidebarFaktur.classList.add('hidden');
      if (bottomNav) {
        bottomNav.className = "bg-white border border-gray-150 rounded-full absolute bottom-3 left-0 right-0 mx-6 grid grid-cols-4 h-12 z-40 shadow-[0_8px_30px_rgba(0,0,0,0.12)] transition-all overflow-visible";
      }
    } else {
      if (tabEntry) tabEntry.classList.add('hidden');
      if (tabFaktur) tabFaktur.classList.add('hidden');
      if (sidebarEntry) sidebarEntry.classList.add('hidden');
      if (sidebarFaktur) sidebarFaktur.classList.add('hidden');
      if (bottomNav) {
        bottomNav.className = "bg-white border border-gray-150 rounded-full absolute bottom-3 left-0 right-0 mx-6 grid grid-cols-3 h-12 z-40 shadow-[0_8px_30px_rgba(0,0,0,0.12)] transition-all overflow-visible";
      }
      
      if (state.activeView === 'entry' || state.activeView === 'faktur') {
        state.activeView = 'stok';
        renderActiveView();
      }
    }
    
    if (typeof lucide !== 'undefined' && lucide.createIcons) {
      lucide.createIcons();
    }
  }

  function checkLoginSession() {
    const savedUser = sessionStorage.getItem('rg_user_session');
    const savedRole = sessionStorage.getItem('rg_role_session');
    const savedClinic = sessionStorage.getItem('rg_clinic_session');

    if (savedUser && savedRole) {
      state.currentUser = savedUser;
      state.currentRole = savedRole;
      state.currentClinicId = savedClinic || '';
      document.getElementById('loginScreen').classList.add('hidden');
      setupNavPermissions();
      fetchData();
    } else {
      document.getElementById('loginScreen').classList.remove('hidden');
      showLoading(false);
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        lucide.createIcons();
      }
    }
  }

  window.submitLogin = submitLogin;
  window.checkLoginSession = checkLoginSession;
  window.selectRole = selectRole;
  window.flipBack = flipBack;
</script>
