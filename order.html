<!-- ================= VIEW: FORM DISTRIBUSI / REQUEST KLINIK ================= -->
<section id="screen-form-order" class="hidden p-4 space-y-6">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 space-y-5">
    
    <!-- Pemicu Pilih Barang (Menggantikan Select Bawaan demi Fitur Pencarian) -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">NAMA BARANG <span class="text-rose-500">*</span></label>
      <div id="order-select-trigger" onclick="openProductSearchModal()" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3.5 text-sm flex justify-between items-center cursor-pointer hover:border-amber-300 active:bg-gray-100 font-semibold text-gray-700 uppercase transition-all">
        <span id="order-select-trigger-text">-- Pilih Barang --</span>
        <div class="text-gray-400"><i data-lucide="chevron-down" class="w-4 h-4"></i></div>
      </div>
      <!-- Hidden Input untuk menyimpan ID Barang terpilih (Sangat aman untuk integrasi validasi & server) -->
      <input type="hidden" id="form-nama-barang" value="">
    </div>

    <!-- Satuan Otomatis -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">SATUAN BARANG <span class="text-gray-400">(OTOMATIS)</span></label>
      <div class="bg-gray-100 border border-gray-200 rounded-lg px-4 py-3.5 text-sm text-gray-600 font-bold tracking-wide uppercase">
        <span id="form-satuan-label">-</span>
      </div>
    </div>

    <!-- Kuantitas dengan Counter -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">QTY DISTRIBUSI <span class="text-rose-500">*</span></label>
      <div class="flex items-center justify-between bg-gray-50 border border-gray-200 rounded-lg p-1">
        <button type="button" onclick="adjustOrderQty(-1)" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-200 rounded-md font-bold text-lg">-</button>
        <input type="number" id="form-qty" value="0" min="0" oninput="validateOrderStock()" class="w-20 text-center bg-transparent border-none outline-none font-semibold text-gray-800 text-lg">
        <button type="button" onclick="adjustOrderQty(1)" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-200 rounded-md font-bold text-lg">+</button>
      </div>
      <!-- Warning Alert -->
      <div id="stock-warning" class="hidden text-rose-500 text-xs flex items-center gap-1 mt-1 font-medium">
        <i data-lucide="alert-circle" class="w-4 h-4"></i>
        <span id="warning-text">Stok kurang, sisa di gudang: 0</span>
      </div>
    </div>

  </div>

  <div class="grid grid-cols-2 gap-4 pt-4">
    <button onclick="goBack()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 py-3.5 rounded-xl text-sm font-bold tracking-wider uppercase transition-colors">
      KEMBALI
    </button>
    <button id="btn-simpan" onclick="submitOrderRecord()" class="bg-gray-300 text-gray-500 py-3.5 rounded-xl text-sm font-bold tracking-wider uppercase cursor-not-allowed w-full transition-all" disabled>
      KIRIM BARANG
    </button>
  </div>

  <!-- ================= POPUP MODAL PENCARIAN BARANG (DIPER-RINGKAS KHUSUS MOBILE) ================= -->
  <div id="productSearchModal" class="hidden fixed inset-0 bg-black/60 z-[130] flex items-start justify-center p-4 pt-6 sm:items-center sm:pt-4 transition-all duration-300 animate-fade-in">
    <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl border border-amber-100 flex flex-col h-[75vh] max-h-[500px] overflow-hidden">
      
      <!-- Header Modal (Lebih Ringkas & Padding Lebih Tipis) -->
      <div class="py-2.5 px-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <h4 class="text-xs font-black text-gray-800 uppercase tracking-wider">Pilih Produk</h4>
        <button onclick="closeProductSearchModal()" class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-200 transition-all flex items-center justify-center">
          <!-- Custom SVG X Close (Sangat Ringkas & Presisi) -->
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <!-- Input Pencarian (Ketinggian Kolom Dipersempit) -->
      <div class="py-2 px-4 border-b border-gray-100 bg-white">
        <div class="relative flex items-center">
          <!-- Custom SVG Search (Presisi & Pas) -->
          <svg class="absolute left-3 w-3.5 h-3.5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="productSearchInput" oninput="filterProductSearchList()" placeholder="Ketik nama produk..." class="w-full bg-gray-55 border border-gray-200 rounded-lg py-2 pl-9 pr-3 text-xs focus:outline-none focus:ring-2 focus:ring-amber-400 text-gray-700 font-semibold" autocomplete="off">
        </div>
      </div>

      <!-- Daftar Produk (Gulir Scrollable - Tetap Menggunakan Ukuran Sesuai Desain Awal) -->
      <div id="productSearchList" class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar bg-gray-50">
        <!-- Diisi secara dinamis melalui filterProductSearchList() -->
      </div>

    </div>
  </div>

</section>

<script>
  function initOrderDropdowns() {
    // Dipanggil saat awal inisialisasi aplikasi.
    // Kita menyinkronkan data stok internal ke modal pencarian produk.
    filterProductSearchList();
  }

  function setupOrderInputs() {
    // Mengosongkan form sebelum mulai
    resetOrderForm();
  }

  // --- CONTROLLER POPUP PENCARIAN BARANG (FITUR 1) ---
  function openProductSearchModal() {
    const modal = document.getElementById('productSearchModal');
    const searchInp = document.getElementById('productSearchInput');
    
    if (searchInp) {
      searchInp.value = ''; // Kosongkan input pencarian
    }

    if (modal) {
      modal.classList.remove('hidden');
      filterProductSearchList(); // Render daftar barang utuh
      
      // Auto-focus keyboard instan untuk Android WebView
      setTimeout(() => {
        if (searchInp) {
          searchInp.focus();
          searchInp.select();
        }
      }, 150);
    }
  }

  function closeProductSearchModal() {
    const modal = document.getElementById('productSearchModal');
    if (modal) {
      modal.classList.add('hidden');
    }
  }

  function filterProductSearchList() {
    const listContainer = document.getElementById('productSearchList');
    const searchInp = document.getElementById('productSearchInput');
    if (!listContainer) return;

    listContainer.innerHTML = '';
    const query = searchInp ? searchInp.value.toLowerCase().trim() : '';
    
    const stockItems = db.stok || [];
    
    // Filter pencarian: Tidak membedakan huruf besar/kecil (case-insensitive) dan mendukung partial match
    const filtered = stockItems.filter(item => {
      const name = (getVal(item, 'nama_barang', 1) || '').toLowerCase();
      return name.includes(query);
    });

    if (filtered.length === 0) {
      listContainer.innerHTML = `
        <div class="text-center py-10 text-gray-400">
          <i data-lucide="package-open" class="w-8 h-8 mx-auto mb-2 text-gray-300"></i>
          <p class="text-[11px] font-semibold">Produk tidak ditemukan</p>
        </div>
      `;
      if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
      return;
    }

    filtered.forEach(item => {
      const id = getVal(item, 'id_barang', 0);
      const name = getVal(item, 'nama_barang', 1);
      const qty = Number(getVal(item, 'qty', 2)) || 0;
      const satuan = getVal(item, 'satuan', 3) || "PCS";

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.onclick = () => selectProductFromSearch(id, name, qty, satuan);
      btn.className = "w-full p-3 text-left bg-white active:bg-amber-50 border border-gray-100 hover:border-amber-200 rounded-2xl flex justify-between items-center transition-all shadow-sm";
      
      btn.innerHTML = `
        <div class="flex-1 min-w-0 pr-3">
          <span class="block font-bold text-xs text-gray-800 uppercase truncate">${name}</span>
          <span class="inline-block bg-gray-100 text-gray-500 font-bold px-1.5 py-0.5 rounded text-[8px] mt-1">${satuan}</span>
        </div>
        <div class="px-2.5 py-1 rounded-xl text-center min-w-14 bg-amber-50 text-amber-700 flex-shrink-0">
          <span class="block text-xs font-black leading-none">${qty}</span>
          <span class="text-[6px] font-black tracking-widest uppercase">STOK</span>
        </div>
      `;
      listContainer.appendChild(btn);
    });

    if (typeof lucide !== 'undefined' && lucide.createIcons) {
      lucide.createIcons();
    }
  }

  function selectProductFromSearch(id, name, qty, satuan) {
    const hiddenInp = document.getElementById('form-nama-barang');
    const triggerTxt = document.getElementById('order-select-trigger-text');
    const satuanLbl = document.getElementById('form-satuan-label');

    if (hiddenInp) hiddenInp.value = id;
    if (triggerTxt) triggerTxt.innerText = name.toUpperCase();
    if (satuanLbl) satuanLbl.innerText = satuan;

    closeProductSearchModal();
    validateOrderStock();
  }

  // --- KONTROL TAMBAHAN & VALIDASI (PERTANGGUNGJAWABAN HAK AKSES DAN STOK) ---
  function adjustOrderQty(amount) {
    const qtyInput = document.getElementById('form-qty');
    if (qtyInput) {
      let current = parseInt(qtyInput.value) || 0;
      current += amount;
      if (current < 0) current = 0;
      qtyInput.value = current;
      validateOrderStock();
    }
  }

  function validateOrderStock() {
    const idBarang = document.getElementById('form-nama-barang').value;
    const qtyField = document.getElementById('form-qty');
    if (!qtyField) return;

    const requested = parseInt(qtyField.value) || 0;
    
    const warning = document.getElementById('stock-warning');
    const warningTxt = document.getElementById('warning-text');
    const simpanBtn = document.getElementById('btn-simpan');

    // Jika tidak ada barang yang dipilih
    if (idBarang === '') {
      if (warning) warning.classList.add('hidden');
      if (simpanBtn) {
        simpanBtn.disabled = true;
        simpanBtn.className = "bg-gray-300 text-gray-500 py-3.5 rounded-xl text-sm font-bold tracking-wider uppercase cursor-not-allowed w-full transition-all";
      }
      return;
    }

    // Jika barang sudah dipilih tetapi kuantitas masih <= 0
    if (requested <= 0) {
      if (warning) warning.classList.add('hidden');
      if (simpanBtn) {
        simpanBtn.disabled = true;
        simpanBtn.className = "bg-gray-300 text-gray-500 py-3.5 rounded-xl text-sm font-bold tracking-wider uppercase cursor-not-allowed w-full transition-all";
      }
      return;
    }

    const stockItems = db.stok || [];
    const item = stockItems.find(b => getVal(b, 'id_barang', 0) === idBarang);

    if (item) {
      const actualQty = Number(getVal(item, 'qty', 2)) || 0;
      if (requested > actualQty) {
        if (warningTxt) warningTxt.innerText = `Stok di gudang tidak cukup, tersisa: ${actualQty}`;
        if (warning) warning.classList.remove('hidden');
        if (simpanBtn) {
          simpanBtn.disabled = true;
          simpanBtn.className = "bg-gray-300 text-gray-500 py-3.5 rounded-xl text-sm font-bold tracking-wider uppercase cursor-not-allowed w-full transition-all";
        }
      } else {
        if (warning) warning.classList.add('hidden');
        if (simpanBtn) {
          simpanBtn.disabled = false;
          simpanBtn.className = "bg-theme-primary hover:bg-amber-600 text-white py-3.5 rounded-xl text-sm font-bold tracking-wider uppercase transition-colors shadow-md w-full transition-all";
        }
      }
    }
  }

  function submitOrderRecord() {
    const idBarang = document.getElementById('form-nama-barang').value;
    const qty = parseInt(document.getElementById('form-qty').value) || 0;

    if (idBarang === '') {
      showToast("⚠️ Silakan pilih Nama Barang terlebih dahulu!");
      return;
    }
    if (qty <= 0) {
      showToast("⚠️ Jumlah distribusi harus di atas 0!");
      return;
    }

    const stockItems = db.stok || [];
    const item = stockItems.find(b => getVal(b, 'id_barang', 0) === idBarang);
    if (!item) return;

    const actualQty = Number(getVal(item, 'qty', 2)) || 0;
    if (qty > actualQty) {
      showToast("⚠️ Transaksi dibatalkan: Stok gudang kurang.");
      return;
    }

    const record = {
      tanggal: getTodayFormatted(),
      id_klinik: state.selectedClinicId,
      id_barang: idBarang,
      nama_barang: getVal(item, 'nama_barang', 1),
      qty_keluar: qty,
      satuan: getVal(item, 'satuan', 3) || "PCS"
    };

    showLoading(true, "MEMPROSES PENGIRIMAN...");

    callServer('simpanOrder', record)
      .then(response => {
        showLoading(false);
        if (response && response.success) {
          showToast(`✅ Berhasil mengirimkan ${qty} ${getVal(item, 'satuan', 3)} ke klinik!`);
          
          // AMBIL DATA TERBARU DARI SPREADSHEET DI SERVER SECARA REAL-TIME UNTUK UPDATE DATA STOK LOKAL
          fetchData();
          
          // FITUR 2: QUICK ENTRY MODE (Reset Form & Otomatis Buka Cari Barang)
          resetOrderForm();
          
          setTimeout(() => {
            openProductSearchModal(); // Luncurkan kembali modul input pencarian tanpa pindah halaman
          }, 350);

        } else {
          showToast("⚠️ Gagal: " + (response ? response.error : 'Format ditolak oleh server'));
        }
      })
      .catch(error => {
        showLoading(false);
        showToast("⚠️ Masalah Server: " + error.message);
      });
  }

  // Membersihkan dan meriset seluruh elemen input formulir order
  function resetOrderForm() {
    const hiddenInp = document.getElementById('form-nama-barang');
    const triggerTxt = document.getElementById('order-select-trigger-text');
    const qtyField = document.getElementById('form-qty');
    const satuanLbl = document.getElementById('form-satuan-label');
    const warning = document.getElementById('stock-warning');

    if (hiddenInp) hiddenInp.value = '';
    if (triggerTxt) triggerTxt.innerText = '-- Pilih Barang --';
    if (qtyField) qtyField.value = 0;
    if (satuanLbl) satuanLbl.innerText = '-';
    if (warning) warning.classList.add('hidden');

    validateOrderStock();
  }

  window.initOrderDropdowns = initOrderDropdowns;
  window.setupOrderInputs = setupOrderInputs;
  window.adjustOrderQty = adjustOrderQty;
  window.validateOrderStock = validateOrderStock;
  window.submitOrderRecord = submitOrderRecord;
  window.openProductSearchModal = openProductSearchModal;
  window.closeProductSearchModal = closeProductSearchModal;
  window.filterProductSearchList = filterProductSearchList;
  window.selectProductFromSearch = selectProductFromSearch;
  window.resetOrderForm = resetOrderForm;
</script>
