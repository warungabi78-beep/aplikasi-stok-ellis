<!-- ================= VIEW: MANAJEMEN KLINIK CABANG (GRID DESIGN 1000346956.jpg) ================= -->
<section id="screen-klinik" class="p-4 hidden space-y-4">
  <div id="klinikGrid" class="grid grid-cols-2 gap-4 animate-fade-in">
    <!-- Diisi secara dinamis oleh renderKlinikGrid() -->
  </div>
</section>

<!-- ================= VIEW: DETIL KLINIK & RIWAYAT ORDERAN (TABLE DESIGN 100034727.jpg) ================= -->
<section id="screen-clinic-detail" class="hidden flex flex-col min-h-full pb-20 relative">
  
  <!-- Kotak Info Utama Klinik Terpilih Telah Dihilangkan Agar Tampilan Lebih Lapang & Bersih -->

  <!-- Header Kolom Riwayat (Sesuai Screenshot 100034727.jpg / 1000347435.jpg) -->
  <div class="grid grid-cols-12 px-4 py-3 bg-gray-50 border-b border-gray-150 text-[10px] font-black text-gray-500 uppercase tracking-widest">
    <div class="col-span-7">NAMA BARANG / SATUAN</div>
    <div class="col-span-2 text-center">QTY</div>
    <div class="col-span-3 text-right">CEKLIST STATUS</div>
  </div>

  <!-- Kontainer List Riwayat Terkelompok Berdasarkan Tanggal -->
  <div id="clinicHistoryListContainer" class="flex-1 divide-y divide-gray-100 overflow-y-auto no-scrollbar">
    <!-- Diisi secara dinamis oleh renderClinicDetailView() -->
  </div>

  <!-- ================= TOMBOL FAB MENGAMBANG TUNGGAL (Pencil Icon) ================= -->
  <!-- Ditambahkan style="display: none;" secara default agar tidak muncul sebelum verifikasi akses -->
  <button id="detail-fab" onclick="openInputFromDial()" class="fixed bottom-24 right-6 md:right-[calc(50vw-11rem)] w-14 h-14 bg-theme-primary text-white rounded-full shadow-2xl items-center justify-center border-2 border-white transition-all duration-300 hover:bg-amber-600 active:scale-95 z-[80]" style="display: none;">
    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
      <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
    </svg>
  </button>

</section>

<script>
  /* STREAMING_CHUNK: Merender daftar grid klinik */
  function renderKlinikGrid() {
    const container = document.getElementById('klinikGrid');
    if (!container) return;
    container.innerHTML = '';

    const listKlinik = db.klinik || [];
    const filtered = listKlinik.filter(c => {
      const name = getVal(c, 'nama_klinik', 1);
      return name && name.toLowerCase().includes(state.searchQuery.toLowerCase());
    });

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="col-span-2 text-center py-16 text-gray-400">
          <i data-lucide="building" class="w-12 h-12 mx-auto mb-2 text-gray-300"></i>
          <p class="text-sm font-semibold">Klinik tidak ditemukan</p>
        </div>
      `;
      if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
      return;
    }

    filtered.forEach(c => {
      const id = getVal(c, 'id_klinik', 0);
      const name = getVal(c, 'nama_klinik', 1);
      
      const card = document.createElement('div');
      card.onclick = () => selectClinic(id);
      card.className = "bg-white rounded-[24px] overflow-hidden shadow-[0_8px_24px_rgba(0,0,0,0.06)] flex flex-col cursor-pointer active:scale-95 transition-all duration-300 border border-gray-50/50";
      
      card.innerHTML = `
        <div class="bg-[#F5A21A] pt-7 pb-9 flex items-center justify-center relative">
          <div class="w-[70px] h-[70px] rounded-full border-[2px] border-white flex items-center justify-center drop-shadow-md">
            <span class="text-white text-3xl font-serif font-medium select-none">E</span>
          </div>
        </div>
        <div class="bg-white px-3.5 py-3.5 flex items-center gap-2">
          <svg class="w-4 h-4 text-[#F5A21A] flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
            <path d="M9 22v-4h6v4"></path>
            <path d="M8 6h.01"></path>
            <path d="M16 6h.01"></path>
            <path d="M12 6h.01"></path>
            <path d="M12 10h.01"></path>
            <path d="M12 14h.01"></path>
            <path d="M16 10h.01"></path>
            <path d="M16 14h.01"></path>
            <path d="M8 10h.01"></path>
            <path d="M8 14h.01"></path>
          </svg>
          <span class="font-extrabold text-[11px] text-gray-800 uppercase tracking-widest truncate">${name}</span>
        </div>
      `;
      container.appendChild(card);
    });
    if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
  }

  function selectClinic(id) {
    state.selectedClinicId = id;
    state.activeView = 'clinic-detail';
    renderActiveView();
  }

  /* STREAMING_CHUNK: Merender tabel riwayat klinik dan memvalidasi FAB */
  function renderClinicDetailView() {
    const listContainer = document.getElementById('clinicHistoryListContainer');
    if (!listContainer) return;
    listContainer.innerHTML = '';

    const clinic = db.klinik.find(c => getVal(c, 'id_klinik', 0) === state.selectedClinicId);
    
    // Keamanan Kode: Menggunakan pengaman 'if' agar tidak error saat info card dihilangkan dari HTML
    const clinicNameEl = document.getElementById('detailClinicName');
    const clinicIdEl = document.getElementById('detailClinicId');
    const clinicLetterEl = document.getElementById('detailClinicLetter');
    if (clinic && clinicNameEl) clinicNameEl.innerText = getVal(clinic, 'nama_klinik', 1);
    if (clinic && clinicIdEl) clinicIdEl.innerText = getVal(clinic, 'id_klinik', 0);
    if (clinic && clinicLetterEl) clinicLetterEl.innerText = getVal(clinic, 'nama_klinik', 1).charAt(0).toUpperCase();

    const clinicId = clinic ? getVal(clinic, 'id_klinik', 0) : '';
    const clinicName = clinic ? getVal(clinic, 'nama_klinik', 1) : '';

    const allOrders = db.order || [];
    const filteredOrders = allOrders.filter(o => {
      const oKlinik = getVal(o, 'id_klinik', 2).toString().trim().toUpperCase();
      return oKlinik === clinicId.toUpperCase() || oKlinik === clinicName.toUpperCase();
    });

    // Urutkan tanggal terbaru paling atas
    filteredOrders.sort((a, b) => {
      const dateA = parseDate(getVal(a, 'tanggal', 1));
      const dateB = parseDate(getVal(b, 'tanggal', 1));
      return dateB - dateA;
    });

    if (filteredOrders.length === 0) {
      listContainer.innerHTML = `
        <div class="text-center py-20 text-gray-400">
          <svg class="w-12 h-12 mx-auto mb-2 text-gray-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="9" x2="15" y2="15"></line>
            <line x1="15" y1="9" x2="9" y2="15"></line>
          </svg>
          <p class="text-[11px] font-bold uppercase tracking-wider">Belum ada transaksi distribusi</p>
        </div>
      `;
    } else {
      let lastDate = "";

      filteredOrders.forEach(o => {
        const idOrder = getVal(o, 'id_order', 0);
        const tanggal = getVal(o, 'tanggal', 1);
        const namaBarang = getVal(o, 'nama_barang', 4);
        const qty = parseInt(getVal(o, 'qty_keluar', 5)) || 0;
        const satuan = getVal(o, 'satuan', 6) || 'PCS';
        const status = (getVal(o, 'status', 7) || 'BELUM').toUpperCase();

        // Kelompokkan Tanggal Menggunakan Banner Kuning Transparan
        if (tanggal !== lastDate) {
          lastDate = tanggal;
          const dateBanner = document.createElement('div');
          dateBanner.className = "bg-amber-50/70 border-y border-gray-100 py-2 px-4 text-[10px] font-black text-amber-800 flex items-center gap-1.5 sticky top-0 z-10 backdrop-blur-sm";
          dateBanner.innerHTML = `
            <svg class="w-3.5 h-3.5 text-amber-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>${tanggal}</span>
          `;
          listContainer.appendChild(dateBanner);
        }

        // Baris Card Barang
        const row = document.createElement('div');
        row.className = "grid grid-cols-12 px-4 py-3.5 items-center bg-white hover:bg-gray-50/60 transition-colors border-b border-gray-50";

        const isSudah = status === 'SUDAH';
        const statusClass = isSudah 
          ? "text-emerald-600 bg-emerald-50 border-emerald-200 hover:bg-emerald-100" 
          : "text-rose-600 bg-rose-50 border-rose-200 hover:bg-rose-100";

        row.innerHTML = `
          <div class="col-span-7 pr-2">
            <span class="block font-black text-xs text-gray-800 uppercase tracking-wide truncate">${namaBarang}</span>
            <span class="inline-block bg-gray-100 text-gray-500 font-bold px-1.5 py-0.5 rounded text-[8px] mt-1 uppercase">${satuan}</span>
          </div>
          <div class="col-span-2 text-center font-black text-xs text-gray-800">
            ${qty}
          </div>
          <div class="col-span-3 text-right">
            <button onclick="toggleOrderStatus('${idOrder}', '${status}')" class="text-[9px] font-black px-2.5 py-1 rounded-md uppercase tracking-wider transition-all border ${statusClass}">
              ${status}
            </button>
          </div>
        `;
        listContainer.appendChild(row);
      });
    }

    // --- LOGIKA VALIDASI VISIBILITAS TOMBOL FAB (PEN) ---
    // Hanya tampilkan jika Role adalah ADMIN, OWNER, atau jika ID Klinik cocok dengan user bersangkutan
    const fabBtn = document.getElementById('detail-fab');
    if (fabBtn) {
      if (typeof isUserAssignedToClinic === 'function' && isUserAssignedToClinic(state.selectedClinicId)) {
        fabBtn.style.display = 'flex'; // Munculkan (mengembalikan display:flex bawaan tailwind)
      } else {
        fabBtn.style.display = 'none'; // Sembunyikan total dari view
      }
    }
  }

  /* STREAMING_CHUNK: Kontrol fungsi riwayat klinik */
  function toggleOrderStatus(orderId, currentStatus) {
    const nextStatus = currentStatus === 'SUDAH' ? 'BELUM' : 'SUDAH';
    showLoading(true, "MENGUPDATE CEKLIST STATUS...");

    callServer('toggleOrderStatusInSheet', orderId, nextStatus)
      .then(response => {
        showLoading(false);
        if (response && response.success) {
          showToast(`✅ Berhasil diubah menjadi ${nextStatus}!`);
          fetchData(); // Sync instan
        } else {
          showToast("⚠️ Gagal: " + (response ? response.error : 'Ditolak server'));
        }
      })
      .catch(err => {
        showLoading(false);
        showToast("⚠️ Koneksi Bermasalah: " + err.message);
      });
  }

  function openInputFromDial() {
    switchView('order');
  }

  window.renderKlinikGrid = renderKlinikGrid;
  window.selectClinic = selectClinic;
  window.renderClinicDetailView = renderClinicDetailView;
  window.toggleOrderStatus = toggleOrderStatus;
  window.openInputFromDial = openInputFromDial;
</script>
