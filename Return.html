<!-- ================= VIEW: RETUR DASHBOARD ================= -->
<section id="screen-return" class="p-4 hidden space-y-4">
  <div id="returnClinicGrid" class="grid grid-cols-2 gap-4 animate-fade-in">
    <!-- Diisi secara dinamis -->
  </div>
</section>

<!-- ================= VIEW: RIWAYAT RETUR PER KLINIK ================= -->
<section id="screen-return-detail" class="hidden flex flex-col min-h-full pb-20 relative">
  
  <div class="grid grid-cols-12 px-4 py-3 bg-gray-50 border-b border-gray-150 text-[10px] font-black text-gray-500 uppercase tracking-widest">
    <div class="col-span-10">BARANG / SATUAN / KETERANGAN</div>
    <div class="col-span-2 text-right">QTY</div>
  </div>

  <div id="returnHistoryListContainer" class="flex-1 divide-y divide-gray-100 overflow-y-auto no-scrollbar">
    <!-- Diisi secara dinamis -->
  </div>

  <!-- TOMBOL FAB: Hanya muncul untuk Admin, Owner, atau User klinik terkait -->
  <button id="return-detail-fab" onclick="switchView('return-form')" class="fixed bottom-24 right-6 md:right-[calc(50vw-11rem)] w-14 h-14 bg-rose-500 text-white rounded-full shadow-2xl items-center justify-center border-2 border-white transition-all duration-300 hover:bg-rose-600 active:scale-95 z-[80] hidden">
    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
      <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
    </svg>
  </button>
</section>

<!-- ================= VIEW: FORM RETURN BARANG ================= -->
<section id="screen-form-return" class="hidden p-4 space-y-6">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 space-y-5">
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">NAMA BARANG <span class="text-rose-500">*</span></label>
      <div id="return-select-trigger" onclick="openReturnSearchModal()" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3.5 text-sm flex justify-between items-center cursor-pointer hover:border-rose-300 font-semibold text-gray-700 uppercase">
        <span id="return-select-trigger-text">-- Pilih Barang --</span>
      </div>
      <input type="hidden" id="form-return-nama-barang" value="">
    </div>
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">QTY RETUR <span class="text-rose-500">*</span></label>
      <div class="flex items-center justify-between bg-gray-50 border border-gray-200 rounded-lg p-1">
        <button type="button" onclick="adjustReturnQty(-1)" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-200 rounded-md font-bold text-lg">-</button>
        <input type="number" id="form-return-qty" value="0" min="0" oninput="validateReturnInput()" class="w-20 text-center bg-transparent border-none outline-none font-semibold text-gray-800 text-lg">
        <button type="button" onclick="adjustReturnQty(1)" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-200 rounded-md font-bold text-lg">+</button>
      </div>
    </div>
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">TANGGAL EXPIRED <span class="text-rose-500">*</span></label>
      <input type="date" id="form-return-expired" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3.5 text-sm text-gray-700 font-semibold">
    </div>
  </div>
  <button id="btn-return-simpan" onclick="submitReturnRecord()" class="bg-gray-300 text-gray-500 w-full py-3.5 rounded-xl text-sm font-bold tracking-wider uppercase transition-all" disabled>PROSES RETUR</button>
</section>

<script> 
  /**
   * Memperbarui tampilan daftar retur dan melakukan validasi akses FAB
   * agar hanya muncul untuk Admin, Owner, atau User klinik yang bersangkutan.
   */
  function renderReturnDetailView() {
    const container = document.getElementById('returnHistoryListContainer');
    if (!container) return;
    
    // 1. Logika untuk merender daftar riwayat retur (asumsi data dari db.retur)
    // container.innerHTML = ... (isi dengan logika mapping data Anda)

    // 2. Validasi FAB (Floating Action Button)
    const fabBtn = document.getElementById('return-detail-fab');
    if (!fabBtn) return;

    // Ambil data user dari state global
    const userRole = (state.currentRole || '').toUpperCase();
    const currentClinicId = state.selectedClinicId;

    // Logika akses:
    // - Admin & Owner selalu bisa mengakses (Admin/Owner memiliki akses penuh)
    // - User klinik hanya bisa mengakses jika klinik yang dipilih sama dengan klinik user
    const isAdminOrOwner = (userRole === 'ADMIN' || userRole === 'OWNER');
    
    // Cek apakah user memiliki akses ke klinik tersebut
    // Menggunakan helper 'isUserAssignedToClinic' jika tersedia, atau cek langsung ID klinik
    let hasClinicAccess = false;
    if (typeof isUserAssignedToClinic === 'function') {
        hasClinicAccess = isUserAssignedToClinic(currentClinicId);
    } else {
        // Fallback sederhana jika helper tidak ada
        hasClinicAccess = (state.userClinicId === currentClinicId);
    }

    // Tampilkan FAB hanya jika memenuhi syarat
    if (isAdminOrOwner || hasClinicAccess) {
      fabBtn.classList.remove('hidden');
      fabBtn.classList.add('flex'); // Pastikan flex agar layout rapi
    } else {
      fabBtn.classList.add('hidden');
      fabBtn.classList.remove('flex');
    }
    
    lucide.createIcons();
  }
  
  window.renderReturnDetailView = renderReturnDetailView;
</script>
