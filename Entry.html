<!-- ================= VIEW: FORM ENTRY BARANG MASUK ================= -->
<section id="screen-entry" class="hidden p-4 space-y-6">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 space-y-5">
    <div class="border-b border-gray-100 pb-2">
      <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wide">INPUT BARANG MASUK</h3>
      <p class="text-[10px] text-gray-400">Pendaftaran stok barang yang datang dari Supplier.</p>
    </div>

    <!-- Dropdown: Supplier -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">SUPPLIER <span class="text-rose-500">*</span></label>
      <div class="relative">
        <select id="entry-supplier" onchange="validateEntryInputs()" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 appearance-none text-gray-700 font-semibold uppercase">
          <!-- Terisi melalui JS -->
        </select>
        <div class="absolute right-3 top-3.5 pointer-events-none text-gray-400"><i data-lucide="chevron-down" class="w-4 h-4"></i></div>
      </div>
    </div>

    <!-- Dropdown: Nama Barang -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">NAMA BARANG <span class="text-rose-500">*</span></label>
      <div class="relative">
        <select id="entry-nama-barang" onchange="handleEntryItemSelectChange()" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 appearance-none text-gray-700 font-semibold uppercase">
          <!-- Terisi melalui JS -->
        </select>
        <div class="absolute right-3 top-3.5 pointer-events-none text-gray-400"><i data-lucide="chevron-down" class="w-4 h-4"></i></div>
      </div>
    </div>

    <!-- Satuan Ketentuan Otomatis -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">SATUAN BARANG <span class="text-gray-400">(OTOMATIS)</span></label>
      <div class="bg-gray-100 border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-600 font-bold tracking-wide uppercase">
        <span id="entry-satuan-label">-</span>
      </div>
    </div>

    <!-- Kuantitas Masuk -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">QTY MASUK <span class="text-rose-500">*</span></label>
      <div class="flex items-center justify-between bg-gray-50 border border-gray-200 rounded-lg p-1">
        <button type="button" onclick="adjustQty('entry-qty', -10); validateEntryInputs();" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-200 rounded-md font-bold text-sm">-10</button>
        <button type="button" onclick="adjustQty('entry-qty', -1); validateEntryInputs();" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-200 rounded-md font-bold text-lg">-</button>
        <input type="number" id="entry-qty" value="0" min="0" oninput="validateEntryInputs()" class="w-16 text-center bg-transparent border-none outline-none font-semibold text-gray-800 text-lg">
        <button type="button" onclick="adjustQty('entry-qty', 1); validateEntryInputs();" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-200 rounded-md font-bold text-lg">+</button>
        <button type="button" onclick="adjustQty('entry-qty', 10); validateEntryInputs();" class="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-200 rounded-md font-bold text-sm">+10</button>
      </div>
    </div>

    <!-- No Faktur -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">NO FAKTUR</label>
      <input type="text" id="entry-faktur" placeholder="Contoh: INV/9929" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 text-gray-700 font-semibold">
    </div>

    <!-- Tanggal Expired -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">TANGGAL EXPIRED</label>
      <input type="date" id="entry-expired" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 text-gray-700 font-semibold">
    </div>

    <!-- Note / Catatan -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold text-gray-500 tracking-wider">NOTE / CATATAN</label>
      <input type="text" id="entry-note" placeholder="Tambahkan deskripsi..." class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 text-gray-700 font-semibold">
    </div>
  </div>

  <button id="btn-simpan-entry" onclick="submitEntryRecord()" class="w-full bg-gray-300 text-gray-500 py-3.5 rounded-xl text-xs font-bold tracking-widest uppercase cursor-not-allowed transition-all" disabled>
    SIMPAN DATA MASUK
  </button>
</section>

<script>
  function initEntryDropdowns() {
    // Dropdown Supplier
    const supSel = document.getElementById('entry-supplier');
    if (supSel) {
      supSel.innerHTML = '';
      
      // Opsi kosong default
      const defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.innerText = '-- Pilih Supplier --';
      defaultOpt.selected = true;
      supSel.appendChild(defaultOpt);
      
      const suppliers = db.supplier || [];
      suppliers.forEach(s => {
        const id = getVal(s, 'id_supplier', 0);
        const name = getVal(s, 'nama_supplier', 1);
        if (id && name) {
          const opt = document.createElement('option');
          opt.value = id;
          opt.innerText = name;
          supSel.appendChild(opt);
        }
      });
    }

    // Dropdown Barang
    const brgSel = document.getElementById('entry-nama-barang');
    if (brgSel) {
      brgSel.innerHTML = '';
      
      // Opsi kosong default
      const defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.innerText = '-- Pilih Barang --';
      defaultOpt.selected = true;
      brgSel.appendChild(defaultOpt);
      
      const stockItems = db.stok || [];
      stockItems.forEach(b => {
        const id = getVal(b, 'id_barang', 0);
        const name = getVal(b, 'nama_barang', 1);
        if (id && name) {
          const opt = document.createElement('option');
          opt.value = id;
          opt.innerText = name;
          brgSel.appendChild(opt);
        }
      });
    }
    handleEntryItemSelectChange();
    validateEntryInputs();
  }

  function handleEntryItemSelectChange() {
    const brgSel = document.getElementById('entry-nama-barang');
    if (!brgSel) return;
    const idBarang = brgSel.value;
    const lbl = document.getElementById('entry-satuan-label');
    
    if (idBarang === '') {
      if (lbl) lbl.innerText = '-';
    } else {
      const stockItems = db.stok || [];
      const match = stockItems.find(b => getVal(b, 'id_barang', 0) === idBarang);
      if (lbl) {
        lbl.innerText = match ? (getVal(match, 'satuan', 3) || 'PCS') : 'PCS';
      }
    }
    validateEntryInputs();
  }

  // Melakukan validasi pengisian form entry barang masuk secara real-time
  function validateEntryInputs() {
    const supSel = document.getElementById('entry-supplier');
    const brgSel = document.getElementById('entry-nama-barang');
    const qtyInp = document.getElementById('entry-qty');
    const simpanBtn = document.getElementById('btn-simpan-entry');

    const idSupplier = supSel ? supSel.value : '';
    const idBarang = brgSel ? brgSel.value : '';
    const qty = qtyInp ? parseInt(qtyInp.value) || 0 : 0;

    if (idSupplier !== '' && idBarang !== '' && qty > 0) {
      if (simpanBtn) {
        simpanBtn.disabled = false;
        simpanBtn.className = "w-full bg-theme-primary hover:bg-amber-600 active:scale-95 text-white py-3.5 rounded-xl text-xs font-bold tracking-widest uppercase transition-all shadow-md";
      }
    } else {
      if (simpanBtn) {
        simpanBtn.disabled = true;
        simpanBtn.className = "w-full bg-gray-300 text-gray-500 py-3.5 rounded-xl text-xs font-bold tracking-widest uppercase cursor-not-allowed transition-all";
      }
    }
  }

  function submitEntryRecord() {
    const idSupplier = document.getElementById('entry-supplier').value;
    const idBarang = document.getElementById('entry-nama-barang').value;
    const qty = parseInt(document.getElementById('entry-qty').value) || 0;
    const faktur = document.getElementById('entry-faktur').value.trim();
    const expired = document.getElementById('entry-expired').value;
    const note = document.getElementById('entry-note').value.trim();

    if (idSupplier === '') {
      showToast("⚠️ Silakan pilih Supplier terlebih dahulu!");
      return;
    }
    if (idBarang === '') {
      showToast("⚠️ Silakan pilih Nama Barang terlebih dahulu!");
      return;
    }
    if (qty <= 0) {
      showToast("⚠️ Kuantitas barang harus lebih besar dari 0!");
      return;
    }

    const stockItems = db.stok || [];
    const matchedItem = stockItems.find(b => getVal(b, 'id_barang', 0) === idBarang);
    if (!matchedItem) return;

    const record = {
      tanggal: getTodayFormatted(),
      id_supplier: idSupplier,
      id_barang: idBarang,
      nama_barang: getVal(matchedItem, 'nama_barang', 1),
      qty_masuk: qty,
      no_faktur: faktur,
      expired: expired,
      note: note
    };

    showLoading(true, "MENYIMPAN BARANG MASUK...");

    callServer('simpanBarangMasuk', record)
      .then(response => {
        showLoading(false);
        if (response && response.success) {
          showToast("✅ Sukses meregistrasikan barang masuk!");
          fetchData();
          switchView('stok');
        } else {
          showToast("⚠️ Gagal: " + (response ? response.error : 'Format ditolak oleh server'));
        }
      })
      .catch(error => {
        showLoading(false);
        showToast("⚠️ Gangguan API: " + error.message);
      });
  }

  function resetEntryForm() {
    const qtyField = document.getElementById('entry-qty');
    if (qtyField) qtyField.value = 0;
    const fakturField = document.getElementById('entry-faktur');
    if (fakturField) fakturField.value = '';
    const expField = document.getElementById('entry-expired');
    if (expField) expField.value = '';
    const noteField = document.getElementById('entry-note');
    if (noteField) noteField.value = '';
    
    const supSel = document.getElementById('entry-supplier');
    if (supSel) supSel.value = '';
    const brgSel = document.getElementById('entry-nama-barang');
    if (brgSel) brgSel.value = '';
    
    handleEntryItemSelectChange();
    validateEntryInputs();
  }

  window.initEntryDropdowns = initEntryDropdowns;
  window.handleEntryItemSelectChange = handleEntryItemSelectChange;
  window.submitEntryRecord = submitEntryRecord;
  window.resetEntryForm = resetEntryForm;
  window.validateEntryInputs = validateEntryInputs;
</script>
